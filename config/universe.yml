# =====================================================================
# Equity universe (India / NSE) — manually editable
# =====================================================================
# HOW THIS WORKS
#   * active_symbols    -> scanned every checkpoint (keep to 8-10).
#   * candidate_symbols -> a larger pool to ROTATE into active_symbols by hand.
#                          NOT scanned automatically.
#
# SYMBOL FORMAT (Yahoo Finance via yfinance)
#   NSE stocks use the ".NS" suffix:  RELIANCE.NS, TCS.NS, HDFCBANK.NS
#   BSE stocks use the ".BO" suffix:  RELIANCE.BO  (configure manually if needed)
#   Indices:  NIFTY 50 = ^NSEI ,  NIFTY Bank = ^NSEBANK
#
# yfinance has no API key/quota, but the run still caps symbols
# (market_data.max_symbols_per_run) and is polite between calls.

meta:
  market: "India"
  exchange: "NSE"
  notes: "Large-cap, liquid names only. Edit freely; keep the active list small."

# Benchmark indices for the MarketRegimeEngine. Set fetch_regime: false to skip
# (regime then becomes DATA_INSUFFICIENT, which blocks new buys by default).
benchmarks:
  fetch_regime: true
  primary: { symbol: "^NSEI", exchange: "NSE", name: "NIFTY 50" }
  secondary:
    - { symbol: "^NSEBANK", exchange: "NSE", name: "NIFTY Bank" }

