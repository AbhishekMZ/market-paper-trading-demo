# =====================================================================
# Market Paper Trading Demo - main settings
# v1 MODE: PAPER TRADING ONLY  (no real orders are ever placed)
# =====================================================================

user:
  name: "Mishael Abhishek"

market:
  country: "India"
  exchange: "NSE"
  currency: "INR"
  currency_symbol: "INR"
  timezone: "Asia/Kolkata"

mode:
  paper_trading_only: true
  description: "Fake-money demo. No real orders are ever placed in v1."

capital:
  monthly_fake_capital: 100000
  max_amount_per_trade: 10000
  max_buys_per_day: 50
  max_buys_per_month: 250

risk_thresholds:
  soft_review_pct: -7.0
  strong_review_pct: -10.0
  hard_review_pct: -15.0

notifications:
  email_enabled: true
  whatsapp_enabled: false
  telegram_enabled: false
  alert_email_to: "sahabhi115@gmail.com"
  send_on:
    daily_report: true
    trade_events: true
    risk_events: true
    news_alerts: true
    system_errors: true
    execution_mode_warnings: true

checkpoints:
  - id: "open"
    label: "Morning"
    time_ist: "09:35"
  - id: "mid"
    label: "Midday"
    time_ist: "11:30"
  - id: "close"
    label: "Afternoon"
    time_ist: "14:45"

market_data:
  provider: "yfinance"
  period: "1mo"
  interval: "1d"
  max_symbols_per_run: 34
  max_checkpoints_per_day: 3
  single_checkpoint_mode: false
  allow_unofficial_data_provider: true
  data_provider_warning: "Yahoo Finance via yfinance is unofficial and for research/paper-trading use."

api_budget:
  enabled: false
  reason: "yfinance has no SerpApi key quota; polite limits are used instead."

rate_limits:
  sleep_seconds_between_symbols: 0.25
  max_retries: 2

data_quality:
  max_data_age_minutes: 1440
  min_fields_required: 3
  entry_mtm_divergence_pct: 8
  recent_range_margin_pct: 20
  extreme_move_pct: 20
  split_gap_pct: 25
  mtm_jump_pct: 15
  max_quote_age_minutes: 1440
  block_buys_on_anomaly: true

live_trading_enabled: false
