# =====================================================================
# Scoring configuration
# =====================================================================

scoring:
  weights:
    medium_term_trend: 25
    relative_strength: 20
    volatility_control: 15
    news_event_risk: 15
    liquidity_safety: 10
    quality_valuation: 10
    portfolio_fit: 5

  decision_bands:
    buy_small_paper: 70
    watch: 60
    hold_no_action: 50
    do_not_buy: 35

  buy_candidate_min_score: 70
  max_risk_level_for_buy: "MEDIUM"

  risk_penalties:
    high_volatility: 15
    negative_news: 20
    stale_data: 25
    low_liquidity: 10

  no_trade:
    prefer_no_trade_when_unclear: true
    min_data_quality: "ACCEPTABLE"

hybrid_scoring:
  enabled: true
  final_score_range: [0, 100]
  buy_threshold: 70
  watch_threshold: 60
  no_action_threshold: 50
  do_not_buy_threshold: 35
  conflict_behavior: "prefer_no_action"
  risk_off_blocks_new_buys: true
  data_insufficient_blocks_new_buys: true

  weights:
    trend_following: 18
    relative_strength: 20
    market_regime: 16
    volatility_risk: 12
    news_event_risk: 14
    portfolio_fit: 8
    mean_reversion: 4
    breakout: 8

  experimental_strategies:
    mean_reversion:
      enabled: true
      contributes_to_score: true
      display_only: false
    breakout:
      enabled: true
      contributes_to_score: true
      display_only: false
