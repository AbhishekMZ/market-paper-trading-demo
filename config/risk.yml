# =====================================================================
# Risk configuration
# =====================================================================

risk:
  max_trade_amount: 10000
  monthly_capital_cap: 100000
  max_buys_per_day: 50
  max_buys_per_month: 250
  max_position_allocation_pct: 25

  allowed_product_types:
    - "DELIVERY"
  blocked_product_types:
    - "INTRADAY"
    - "MARGIN"
    - "MIS"
    - "CO"
    - "BO"
    - "FUTURES"
    - "OPTIONS"
    - "FNO"

  allowed_order_types:
    - "LIMIT"
  blocked_order_types:
    - "MARKET"
    - "SL"
    - "SL-M"

  blocked_strategies:
    short_selling: true
    intraday: true
    margin: true
    fno: true
    averaging_down: true

  loss_review_thresholds:
    soft_review_pct: -7.0
    strong_review_pct: -10.0
    hard_review_pct: -15.0

  sell_scope: "bot_owned_only"
  auto_forced_sell: false

  allow_real_orders: false
  reject_on_stale_data: true
